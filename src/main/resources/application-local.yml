spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  
  jpa:
    hibernate:
      ddl-auto: validate
  
  sql:
    init:
      mode: always

  cloud:
    aws:
      sqs:
        endpoint: http://localhost:4566
