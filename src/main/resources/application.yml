spring:
  application:
    name: transaction-authorizer

  profiles:
    active: local

  threads:
    virtual:
      enabled: true

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 2000
      max-lifetime: 600000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc.batch_size: 50
        order_inserts: true
        order_updates: true

  sql:
    init:
      mode: always

  cloud:
    aws:
      endpoint: http://localhost:4566
      region:
        static: sa-east-1
      credentials:
        access-key: test
        secret-key: test
      sqs:
        listener:
          auto-startup: true
          max-concurrent-messages: 30
          max-messages-per-poll: 10

app:
  default-currency: "BRL"
  sqs:
    queue:
      account-created: conta-bancaria-criada

resilience4j:
  retry:
    instances:
      transactionAuthorization:
        max-attempts: 3
        wait-duration: 100ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - org.springframework.dao.CannotAcquireLockException
          - org.hibernate.exception.LockAcquisitionException

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

